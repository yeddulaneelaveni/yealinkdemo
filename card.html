<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green:       #1c7a44;
    --green-dark:  #155c33;
    --green-light: #e8f5ee;
    --green-mid:   #d0eddb;
    --green-text:  #0f4424;
    --accent:      #2daa62;
    --white:       #ffffff;
    --bg:          #f4f7f5;
    --text:        #1a2e22;
    --muted:       #6b8c77;
    --border:      #d4e6db;
    --card-shadow: 0 2px 12px rgba(28,122,68,0.08), 0 1px 3px rgba(0,0,0,0.06);
    --card-hover:  0 8px 32px rgba(28,122,68,0.16), 0 2px 8px rgba(0,0,0,0.08);
  }

  body {
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
    min-height: 100vh;
  }

  /* FLOATING CART BTN */
  #cart-fab {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 150;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 16px rgba(28,122,68,0.35);
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  #cart-fab:hover { background: var(--green-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(28,122,68,0.4); }
  #cart-fab:active { transform: scale(0.97); }
  #cart-count {
    background: #fff;
    color: var(--green-dark);
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 56px 20px 36px;
  }
  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green-light);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 10px;
  }
  .hero h1 span { color: var(--green); }
  .hero p { color: var(--muted); font-size: 16px; }

  /* CARDS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
    padding: 10px 40px 60px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .product-card {
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    border: 1.5px solid var(--border);
    box-shadow: var(--card-shadow);
    position: relative;
  }
  .product-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--card-hover);
    border-color: #a8d8bc;
  }

  .card-img-wrap {
    background: var(--white);
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    border-bottom: 1.5px solid var(--border);
    position: relative;
  }
  .card-img-wrap svg { width: 100px; height: 80px; opacity: 0.18; }

  .card-room-tag {
    position: absolute;
    top: 14px;
    left: 14px;
    background: var(--green-light);
    color: var(--green-text);
    border: 1px solid var(--green-mid);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .card-body {
    background: var(--white);
    padding: 20px 22px 22px;
  }
  .card-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .card-model { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

  .card-footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-price {
    font-size: 22px;
    font-weight: 800;
    color: var(--green);
  }
  .card-cta {
    background: var(--green-light);
    color: var(--green-dark);
    border: 1px solid var(--green-mid);
    border-radius: 8px;
    padding: 7px 13px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s, color 0.18s;
  }
  .card-cta:hover { background: var(--green); color: #fff; }

  /* OVERLAY */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,30,18,0.6);
    backdrop-filter: blur(2px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.active { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 24px;
    max-width: 680px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border: 1.5px solid var(--border);
    box-shadow: 0 24px 80px rgba(0,0,0,0.18);
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 26px;
    border-bottom: 1.5px solid var(--border);
    background: var(--green-light);
    border-radius: 22px 22px 0 0;
  }
  .modal-header h2 { font-size: 17px; font-weight: 800; color: var(--text); }
  .close-btn {
    background: var(--white);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 16px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, border-color 0.2s;
  }
  .close-btn:hover { color: var(--text); border-color: #aaa; }

  .modal-body { padding: 26px; }

  .product-detail-img {
    background: var(--bg);
    border-radius: 14px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    border: 1.5px solid var(--border);
  }
  .product-detail-img svg { width: 120px; height: 96px; opacity: 0.14; }

  .detail-badge {
    display: inline-block;
    background: var(--green-light);
    color: var(--green-text);
    border: 1px solid var(--green-mid);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .detail-title { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .detail-model { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .detail-desc { font-size: 14px; color: #4a6655; line-height: 1.75; margin-bottom: 20px; }

  .specs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }
  .spec-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
  }
  .spec-label { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .spec-value { font-size: 13px; font-weight: 700; color: var(--text); }

  .detail-price { font-size: 30px; font-weight: 800; color: var(--green); margin-bottom: 16px; }

  .qty-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .qty-label { font-size: 13px; color: var(--muted); font-weight: 600; }
  .qty-control { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    background: var(--green-light);
    border: 1px solid var(--green-mid);
    color: var(--green-dark);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    font-weight: 700;
  }
  .qty-btn:hover { background: var(--green); color: #fff; }
  .qty-display { font-size: 15px; font-weight: 700; min-width: 28px; text-align: center; color: var(--text); }

  .add-cart-btn {
    width: 100%;
    background: var(--green);
    color: #fff;
    border: none;
    padding: 15px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .add-cart-btn:hover { background: var(--green-dark); }
  .add-cart-btn:active { transform: scale(0.98); }

  /* CART PANEL */
  .cart-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 290;
  }
  .cart-backdrop.active { display: block; }

  .cart-panel {
    display: none;
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 420px;
    background: var(--white);
    border-left: 1.5px solid var(--border);
    z-index: 300;
    flex-direction: column;
    box-shadow: -8px 0 40px rgba(0,0,0,0.12);
  }
  .cart-panel.active { display: flex; }

  .cart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px;
    border-bottom: 1.5px solid var(--border);
    background: var(--green-light);
  }
  .cart-header h2 { font-size: 17px; font-weight: 800; color: var(--text); }

  .cart-items { flex: 1; overflow-y: auto; padding: 20px 24px; background: var(--white); }

  .cart-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .cart-item:last-child { border-bottom: none; }

  .cart-item-img {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 68px;
    height: 68px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cart-item-img svg { width: 36px; height: 28px; opacity: 0.2; }

  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .cart-item-model { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .cart-item-price { font-size: 14px; font-weight: 800; color: var(--green); }

  .remove-item-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .remove-item-btn:hover { background: #fee; color: #c00; border-color: #f99; }

  .cart-footer {
    padding: 18px 24px;
    border-top: 1.5px solid var(--border);
    background: var(--white);
  }
  .cart-total {
    display: flex;
    justify-content: space-between;
    font-size: 17px;
    font-weight: 800;
    margin-bottom: 14px;
    color: var(--text);
  }
  .cart-total span:last-child { color: var(--green); }

  .checkout-btn {
    width: 100%;
    background: var(--green);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .checkout-btn:hover { background: var(--green-dark); }

  .empty-cart { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-cart-icon { margin-bottom: 12px; opacity: 0.35; }

  /* ORDER FORM */
  .order-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,30,18,0.65);
    backdrop-filter: blur(2px);
    z-index: 400;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .order-overlay.active { display: flex; }

  .order-modal {
    background: var(--white);
    border-radius: 24px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    border: 1.5px solid var(--border);
    box-shadow: 0 24px 80px rgba(0,0,0,0.2);
  }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 10px 13px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(28,122,68,0.12);
  }
  .form-group textarea { resize: vertical; min-height: 76px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .order-summary {
    background: var(--green-light);
    border: 1px solid var(--green-mid);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .order-summary h4 {
    font-size: 11px;
    color: var(--green-text);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .order-summary-item {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 5px;
    color: var(--text);
  }
  .order-summary-total {
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 800;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--green-mid);
    color: var(--text);
  }
  .order-summary-total span:last-child { color: var(--green); }

  .place-order-btn {
    width: 100%;
    background: var(--green);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .place-order-btn:hover { background: var(--green-dark); }
  .place-order-btn:disabled { background: #aaa; cursor: not-allowed; }

  .form-error { color: #c0392b; font-size: 13px; margin-bottom: 12px; display: none; background: #fee; border: 1px solid #fcc; border-radius: 8px; padding: 8px 12px; }

  /* SUCCESS */
  .success-screen { display: none; text-align: center; padding: 50px 30px; }
  .success-screen.active { display: block; }
  .success-icon { margin-bottom: 16px; display: flex; justify-content: center; }
  .success-screen h3 { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  .success-screen p { color: var(--muted); font-size: 14px; line-height: 1.6; }

  /* CAMERA SVG ICON (inline reusable) */
  .cam-svg { display: block; width: 100%; height: 100%; }

  @media (max-width: 640px) {
    .cards-grid { padding: 10px 16px 40px; gap: 16px; }
    .hero h1 { font-size: 28px; }
    .cart-panel { width: 100%; }
    .form-row { grid-template-columns: 1fr; }
    .specs-grid { grid-template-columns: 1fr; }
    #cart-fab { top: 14px; right: 14px; padding: 10px 16px; }
  }

    { label: "Connectivity", value: "RJ45 Ethernet" },
    { label: "Compatibility", value: "Yealink MVC, MeetingBar, MeetingBoard & Pro AV Systems" },
    { label: "Installation", value: "Ceiling Mount, Low-Profile Design" }
  ]
}
];


// ─── PER-USER SESSION CART ────────────────────────────────────────────────────
// Each browser tab/window gets a unique SESSION_ID on first load.
// The cart is stored in sessionStorage under that ID.
// sessionStorage is 100% private per tab — User A cannot see User B's cart.
// Closing the tab clears the session. Refreshing keeps it alive.
// ─────────────────────────────────────────────────────────────────────────────

function initSession() {
  let sid = sessionStorage.getItem('freshroots_session_id');
  if (!sid) {
    sid = 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    sessionStorage.setItem('freshroots_session_id', sid);
  }
  return sid;
}

const SESSION_ID = initSession();
const CART_KEY   = 'cart_' + SESSION_ID;

function saveCart(cartData) {
  // Intentionally not persisted across page loads: a refresh should
  // always start with an empty cart, so we don't write to storage
  // that gets read back in on the next load.
}

// Clear out any cart data left over from a previous version of this
// page so nothing old resurfaces.
sessionStorage.removeItem(CART_KEY);

let cart = [];
let currentProduct = null;
let modalQty = 1;

function formatINR(n) {
  return n.toLocaleString('en-IN');
}

function cardImg(p, size) {
  if (p.image) {
    return `<img src="${p.image}" alt="${p.title}" style="max-height:${size}px;max-width:100%;object-fit:contain;display:block;margin:auto;" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <div style="display:none">${camIcon}</div>`;
  }
  return camIcon;
}

function renderCards() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = products.map(p => `
    <div class="product-card" onclick="openProduct(${p.id})">
      <div class="card-img-wrap">
        <div class="card-room-tag">${p.label}</div>
        ${cardImg(p, 150)}
      </div>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-model">${p.model}</div>
        <div class="card-footer-row">
          <div class="card-price">₹${formatINR(p.price)}</div>
          <div class="card-cta">View Details </div>
        </div>
      </div>
    </div>
  `).join('');
}

function openProduct(id) {
  currentProduct = products.find(p => p.id === id);
  modalQty = 1;
  document.getElementById('modal-title').textContent = currentProduct.title;
  document.getElementById('modal-body').innerHTML = `
    <div class="product-detail-img">${cardImg(currentProduct, 180)}</div>
    <div class="detail-badge">${currentProduct.label}</div>
    <div class="detail-title">${currentProduct.title}</div>
    <div class="detail-model">${currentProduct.model}</div>
    <div class="detail-desc">${currentProduct.description}</div>
    <div class="specs-grid">
      ${currentProduct.specs.map(s => `
        <div class="spec-item">
          <div class="spec-label">${s.label}</div>
          <div class="spec-value">${s.value}</div>
        </div>
      `).join('')}
    </div>
    <div class="detail-price">₹${formatINR(currentProduct.price)}</div>
    <div class="qty-row">
      <span class="qty-label">Qty:</span>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <span class="qty-display" id="modal-qty">1</span>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>
    <button class="add-cart-btn" onclick="addToCart()">Add to Cart →</button>
  `;
  document.getElementById('product-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function changeQty(delta) {
  modalQty = Math.max(1, modalQty + delta);
  document.getElementById('modal-qty').textContent = modalQty;
}

function closeModal() {
  document.getElementById('product-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

function closeProductModal(e) {
  if (e.target === document.getElementById('product-overlay')) closeModal();
}

function addToCart() {
  const existing = cart.find(i => i.id === currentProduct.id);
  if (existing) existing.qty += modalQty;
  else cart.push({ ...currentProduct, qty: modalQty });
  saveCart(cart);
  updateCartUI();
  closeModal();
  flashCartBtn();
}

function flashCartBtn() {
  const btn = document.getElementById('cart-fab');
  btn.style.background = '#155c33';
  btn.style.transform = 'scale(1.1)';
  setTimeout(() => { btn.style.background = ''; btn.style.transform = ''; }, 500);
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent = total;

  const list = document.getElementById('cart-items-list');
  const footer = document.getElementById('cart-footer');

  if (cart.length === 0) {
    list.innerHTML = `<div class="empty-cart"><div class="empty-cart-icon"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#1c7a44" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1.2"/><circle cx="20" cy="21" r="1.2"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div><p>Your cart is empty</p></div>`;
    footer.style.display = 'none';
    return;
  }

  footer.style.display = 'block';
  list.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-img">${cardImg(item, 60)}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.title}</div>
        <div class="cart-item-model">${item.label} · Qty: ${item.qty}</div>
        <div class="cart-item-price">₹${formatINR(item.price * item.qty)}</div>
      </div>
      <button class="remove-item-btn" onclick="removeItem(${item.id})">✕</button>
    </div>
  `).join('');

  const grandTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cart-total-price').textContent = `₹${formatINR(grandTotal)}`;
}

function removeItem(id) {
  cart = cart.filter(i => i.id !== id);
  saveCart(cart);
  updateCartUI();
}

function toggleCart() {
  const panel = document.getElementById('cart-panel');
  const backdrop = document.getElementById('cart-backdrop');
  panel.classList.toggle('active');
  backdrop.classList.toggle('active');
  updateCartUI();
}

function openOrderForm() {
  const grandTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('order-summary').innerHTML = `
    <h4>Order Summary</h4>
    ${cart.map(i => `<div class="order-summary-item"><span>${i.title} × ${i.qty}</span><span>₹${formatINR(i.price * i.qty)}</span></div>`).join('')}
    <div class="order-summary-total"><span>Total</span><span>₹${formatINR(grandTotal)}</span></div>
  `;
  document.getElementById('order-overlay').classList.add('active');
  document.getElementById('success-screen').classList.remove('active');
  document.getElementById('order-form-content').style.display = 'block';
  document.getElementById('form-error').style.display = 'none';
  document.getElementById('place-btn').disabled = false;
  document.getElementById('place-btn').innerHTML = 'Place Order <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-left:6px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
}

function closeOrder() { document.getElementById('order-overlay').classList.remove('active'); }
function closeOrderOverlay(e) { if (e.target === document.getElementById('order-overlay')) closeOrder(); }

function resetCart() {
  cart = [];
  sessionStorage.removeItem(CART_KEY);
  updateCartUI();
  document.getElementById('cart-panel').classList.remove('active');
  document.getElementById('cart-backdrop').classList.remove('active');
}

function showSuccess() {
  document.getElementById('order-form-content').style.display = 'none';
  document.getElementById('success-screen').classList.add('active');
}

function placeOrder() {
  const fname = document.getElementById('fname').value.trim();
  const lname = document.getElementById('lname').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const address = document.getElementById('address').value.trim();
  const country = document.getElementById('country').value;
  const company = document.getElementById('company').value.trim();
  const installation = document.getElementById('installation').value;
  const notes = document.getElementById('notes').value.trim();
  const errEl = document.getElementById('form-error');

  if (!fname || !lname || !email || !phone || !address || !country) {
    errEl.textContent = 'Please fill in all required fields marked with *.';
    errEl.style.display = 'block';
    return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'Please enter a valid email address.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const btn = document.getElementById('place-btn');
  btn.disabled = true;
  btn.textContent = 'Sending…';

  const grandTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const itemsList = cart.map(i => `• ${i.title} (${i.label}) × ${i.qty} — ₹${formatINR(i.price * i.qty)}`).join('\n');

  const templateParams = {
    to_email:     'neelaveni8494@gmail.com',
    from_name:    `${fname} ${lname}`,
    from_email:   email,
    phone:        phone,
    company:      company || 'N/A',
    country:      country,
    address:      address,
    installation: installation,
    order_items:  itemsList,
    order_total:  `₹${formatINR(grandTotal)}`,
    notes:        notes || 'None'
  };

  const keysConfigured = EMAILJS_PUBLIC_KEY  !== 'YOUR_PUBLIC_KEY'
                      && EMAILJS_SERVICE_ID  !== 'YOUR_SERVICE_ID'
                      && EMAILJS_TEMPLATE_ID !== 'YOUR_TEMPLATE_ID';

  function resetPlaceButton() {
    btn.disabled = false;
    btn.innerHTML = `
        Place Order
        <svg width="16" height="16" viewBox="0 0 24 24"
             fill="none"
             stroke="currentColor"
             stroke-width="2.5"
             stroke-linecap="round"
             stroke-linejoin="round"
             style="vertical-align:-2px;margin-left:6px">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
    `;
  }

  if (keysConfigured) {
    emailjs.send(
      EMAILJS_SERVICE_ID,
      EMAILJS_TEMPLATE_ID,
      templateParams
    )
    .then(function (response) {
      console.log("SUCCESS!", response);
      showSuccess();
    })
    .catch(function (err) {
      console.error("EmailJS Error:", err);
      errEl.textContent = 'Something went wrong sending your order. Please try again, or contact us directly.';
      errEl.style.display = 'block';
      resetPlaceButton();
    });
  } else {
    errEl.textContent = 'EmailJS is not configured correctly.';
    errEl.style.display = 'block';
    resetPlaceButton();
  }
}

// Pull the latest prices the admin has published, matched by SKU.
// If this fails for any reason (Firebase not yet configured, offline,
// etc.) we simply keep the hardcoded prices above as a safe fallback —
// the storefront never breaks because of this.
async function loadLivePrices() {
  try {
    const snapshot = await priceDb.collection('prices').get();
    snapshot.forEach(doc => {
      const product = products.find(p => p.sku === doc.id);
      const data = doc.data();
      if (product && typeof data.price === 'number' && data.price > 0) {
        product.price = data.price;
      }
    });
  } catch (err) {
    console.warn('Could not load live prices, using defaults:', err);
  }
}

(async function init() {
  await loadLivePrices();
  renderCards();
  updateCartUI();
  // Show a small session tag in the cart header (last 6 chars of session ID)
  document.getElementById('session-tag').textContent = '#' + SESSION_ID.slice(-6).toUpperCase();
})();
</script>
